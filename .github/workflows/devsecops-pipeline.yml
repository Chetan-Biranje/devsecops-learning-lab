name: 🛡️ DevSecOps Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Nightly full security scan
    - cron: "0 2 * * *"

env:
  IMAGE_NAME: devsecops-lab-app
  REGISTRY:   ghcr.io/${{ github.repository_owner }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ══════════════════════════════════════════════════
  # 1. SAST — Static Application Security Testing
  # ══════════════════════════════════════════════════
  sast:
    name: 🔍 SAST (Bandit + Semgrep)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security tools
        run: |
          pip install bandit semgrep
          mkdir -p security/sast

      - name: Run Bandit (Python SAST)
        run: |
          bandit -r app/src/ \
            -f json \
            -o security/sast/bandit-results.json \
            --severity-level medium \
            --confidence-level medium \
            -ll || true
          bandit -r app/src/ -f txt || true

      - name: Run Semgrep
        run: |
          semgrep --config=auto \
                  --json \
                  --output security/sast/semgrep-results.json \
                  app/src/ || true
          semgrep --config=auto app/src/ || true

      - name: Upload SAST results
        uses: actions/upload-artifact@v7
        with:
          name: sast-results
          path: security/sast/

      - name: Upload Semgrep SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: security/sast/semgrep-results.json
        continue-on-error: true


  # ══════════════════════════════════════════════════
  # 2. SCA — Software Composition Analysis
  # ══════════════════════════════════════════════════
  sca:
    name: 📦 SCA (Safety + pip-audit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: |
          pip install safety pip-audit
          mkdir -p security/sca

      - name: Run Safety (dependency CVE check)
        run: |
          safety check \
            -r app/requirements.txt \
            --json \
            --output security/sca/safety-results.json || true
          safety check -r app/requirements.txt || true

      - name: Run pip-audit
        run: |
          pip-audit \
            -r app/requirements.txt \
            --format json \
            -o security/sca/pip-audit-results.json || true
          pip-audit -r app/requirements.txt || true

      - name: Upload SCA results
        uses: actions/upload-artifact@v7
        with:
          name: sca-results
          path: security/sca/


  # ══════════════════════════════════════════════════
  # 3. Secrets Scanning
  # ══════════════════════════════════════════════════
  secrets:
    name: 🔑 Secrets Scan (Gitleaks + TruffleHog)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for TruffleHog

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified


  # ══════════════════════════════════════════════════
  # 4. Unit Tests + Coverage
  # ══════════════════════════════════════════════════
  test:
    name: 🧪 Unit Tests + Coverage
    runs-on: ubuntu-latest
    needs: [sast]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
  working-directory: app
  env:
    PYTHONPATH: /home/runner/work/devsecops-learning-lab/devsecops-learning-lab/app
  run: |
    pytest tests/ -v \
      --cov=src \
      --cov-report=xml:../security/coverage.xml \
      --cov-report=term-missing \
      --cov-fail-under=80
      
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: security/coverage.xml


  # ══════════════════════════════════════════════════
  # 5. Docker Build + Container Scan (Trivy)
  # ══════════════════════════════════════════════════
  container-scan:
    name: 🐳 Container Build + Trivy Scan
    runs-on: ubuntu-latest
    needs: [test, sca, secrets]
    permissions:
      contents: read
      security-events: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: security/trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: security/trivy-results.sarif

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: "0"

      - name: Push to GHCR (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # ══════════════════════════════════════════════════
  # 6. IaC Security Scan (Checkov + tfsec)
  # ══════════════════════════════════════════════════
  iac-scan:
    name: 🏗️ IaC Security (Checkov + tfsec)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov on Terraform
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          output_format: sarif
          output_file_path: security/iac/checkov-terraform.sarif
          soft_fail: true

      - name: Run Checkov on Kubernetes
        uses: bridgecrewio/checkov-action@master
        with:
          directory: k8s/
          framework: kubernetes
          output_format: sarif
          output_file_path: security/iac/checkov-k8s.sarif
          soft_fail: true

      - name: Run Checkov on Dockerfile
        uses: bridgecrewio/checkov-action@master
        with:
          directory: docker/
          framework: dockerfile
          soft_fail: true

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform/
          soft_fail: true

      - name: Upload IaC scan results
        uses: actions/upload-artifact@v7
        with:
          name: iac-results
          path: security/iac/


  # ══════════════════════════════════════════════════
  # 7. DAST — Dynamic App Security Testing (ZAP)
  # ══════════════════════════════════════════════════
  dast:
    name: 🕷️ DAST (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: [container-scan]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Start application
        run: |
          docker compose -f docker/docker-compose.yml up -d app
          sleep 15

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:5000"
          rules_file_name: security/dast/zap-rules.conf
          cmd_options: "-a -j"
          fail_action: false

      - name: Upload ZAP report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: zap-report
          path: report_html.html

      - name: Stop application
        if: always()
        run: docker compose -f docker/docker-compose.yml down


  # ══════════════════════════════════════════════════
  # 8. Security Report Summary
  # ══════════════════════════════════════════════════
  security-summary:
    name: 📊 Security Summary
    runs-on: ubuntu-latest
    needs: [sast, sca, secrets, test, container-scan, iac-scan]
    if: always()

    steps:
      - name: Security Pipeline Summary
        run: |
          echo "## 🛡️ DevSecOps Security Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 SAST (Bandit + Semgrep)   | ${{ needs.sast.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 SCA (Safety + pip-audit)  | ${{ needs.sca.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔑 Secrets Scan              | ${{ needs.secrets.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Unit Tests                | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Container Scan (Trivy)    | ${{ needs.container-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ IaC Scan (Checkov/tfsec) | ${{ needs.iac-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
