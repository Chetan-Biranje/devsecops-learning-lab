apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsecops-app
  namespace: devsecops
  labels:
    app: devsecops-app
    version: "2.0"
    managed-by: kustomize
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devsecops-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: devsecops-app
      annotations:
        # Force pod restart on config change
        checksum/config: "placeholder"
    spec:
      # ── Security Context (Pod level) ─────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser:    65534
        runAsGroup:   65534
        fsGroup:      65534
        seccompProfile:
          type: RuntimeDefault

      automountServiceAccountToken: false

      # ── Anti-affinity: spread across nodes ───────────
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [devsecops-app]
                topologyKey: kubernetes.io/hostname

      containers:
        - name: app
          image: ghcr.io/chetan-biranje/devsecops-lab-app:v1.0.0@sha256:abc123def456
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: http
              protocol: TCP

          # ── Security Context (Container level) ─────────
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   true
            runAsNonRoot:             true
            runAsUser:                65534
            capabilities:
              drop: [ALL]

          # ── Resources ───────────────────────────────────
          resources:
            requests:
              cpu:    "100m"
              memory: "128Mi"
            limits:
              cpu:    "500m"
              memory: "512Mi"

          # ── Environment ─────────────────────────────────
          env:
            - name: FLASK_DEBUG
              value: "false"

          envFrom:
            - secretRef:
                name: app-secrets

          # ── Health probes ────────────────────────────────
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds:       20
            failureThreshold:    3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds:       10
            failureThreshold:    3

          # ── Ephemeral storage ────────────────────────────
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: secrets
              mountPath: /etc/secrets
              readOnly: true

      volumes:
        - name: tmp
          emptyDir: {}
        - name: secrets
          secret:
            secretName: app-secrets
            defaultMode: 0400

      # ── Image pull secret (GHCR) ─────────────────────
      imagePullSecrets:
        - name: ghcr-credentials
