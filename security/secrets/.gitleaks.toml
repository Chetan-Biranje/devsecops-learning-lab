# DevSecOps Lab – Gitleaks Configuration
title = "Gitleaks – DevSecOps Learning Lab"

[extend]
useDefault = true

[[rules]]
id          = "flask-secret-key"
description = "Flask SECRET_KEY hardcoded"
regex       = '''SECRET_KEY\s*=\s*['"][^'"]{8,}['"]'''
severity    = "ERROR"
tags        = ["flask", "secret"]

[[rules]]
id          = "aws-access-key"
description = "AWS Access Key ID"
regex       = '''AKIA[0-9A-Z]{16}'''
severity    = "CRITICAL"
tags        = ["aws", "credentials"]

[allowlist]
description = "Allowlisted patterns"
regexes     = [
  '''change-me-in-production''',
  '''change-me-in-dev-only''',
  '''EXAMPLE_KEY_.*''',
]
paths       = [
  '''tests/.*''',
  '''docs/.*''',
  '''\.md$''',
]
